apiVersion: v1
kind: Service
metadata:
  name: {{ include "synapse.fullname" . }}
  labels:
    {{- include "synapse.labels" . | nindent 4 }}
    app.kubernetes.io/component: synapse
spec:
  type: {{ .Values.synapse.service.type }}
  ports:
    - port: {{ .Values.synapse.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "synapse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: synapse
