# Synapse SRE Assistant — Helm Values
# Override these in your own values file or with --set flags

# ── Synapse App ────────────────────────────────────────────────
synapse:
  replicaCount: 1
  image:
    repository: ghcr.io/rahulkshinde/synapse
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  env:
    # Slack integration (optional — leave empty to skip)
    SLACK_BOT_TOKEN: ""
    SLACK_DEFAULT_CHANNEL: "#incidents"
  # Extra environment variables as key-value pairs
  extraEnv: {}

# ── Ollama (Local LLM Inference) ──────────────────────────────
ollama:
  enabled: true
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  model: "llama3.2:1b"  # pulled on startup via init container
  service:
    type: ClusterIP
    port: 11434
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""  # use cluster default

# ── ChromaDB (Vector Database for RAG) ────────────────────────
chromadb:
  enabled: true
  image:
    repository: chromadb/chroma
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""

# ── Prometheus (Metrics) ──────────────────────────────────────
prometheus:
  # Set to false if you already have Prometheus in your cluster
  enabled: true
  image:
    repository: prom/prometheus
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  # External Prometheus URL (used when prometheus.enabled=false)
  externalUrl: ""

# ── Node Exporter (Host Metrics) ──────────────────────────────
nodeExporter:
  enabled: true
  image:
    repository: prom/node-exporter
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9100

# ── Global Settings ───────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Network policy: restrict egress from Ollama container
networkPolicy:
  enabled: false  # set to true for VPC-private deployment
