llm:
  url: "http://ollama:11434"
  model: "llama3.1"
  temperature: 0.1

vector_db:
  type: "chromadb"
  host: "chromadb"
  port: 8000
  collection_name: "synapse_knowledge"

plugins:
  metrics:
    prometheus:
      enabled: true
      base_url: "http://prometheus:9090"
      timeout: 30
  messenger:
    slack:
      enabled: true
      bot_token: "${SLACK_BOT_TOKEN}"
      default_channel: "#incidents"

security:
  custom_patterns: {}
  enabled: true
  replacement: "[REDACTED]"

app:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"
  debug: false
  cors_enabled: false
